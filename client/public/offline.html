<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#0f172a" />
    <title>AF Silva Transportes</title>
    <style>
      :root {
        color-scheme: light;
        font-family: "DM Sans", system-ui, sans-serif;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        background: linear-gradient(180deg, #eff6ff 0%, #f8fafc 55%, #ffffff 100%);
        color: #0f172a;
      }
      main {
        width: min(100%, 420px);
        background: rgba(255, 255, 255, 0.92);
        border: 1px solid rgba(15, 23, 42, 0.08);
        border-radius: 24px;
        padding: 28px;
        box-shadow: 0 18px 40px rgba(15, 23, 42, 0.12);
        text-align: center;
      }
      img {
        width: 88px;
        height: 88px;
        border-radius: 24px;
        object-fit: cover;
        box-shadow: 0 8px 24px rgba(15, 23, 42, 0.12);
        margin-bottom: 18px;
      }
      h1 {
        margin: 0 0 8px;
        font-size: 1.4rem;
      }
      p {
        margin: 0 0 18px;
        line-height: 1.6;
        color: #475569;
      }
      button {
        border: 0;
        border-radius: 999px;
        padding: 12px 18px;
        background: #2563eb;
        color: white;
        font: inherit;
        font-weight: 700;
      }
    </style>
  </head>
  <body>
    <main>
      <img src="/favicon.jpg" alt="AF Silva Transportes" />
      <h1>Sem conexão no momento</h1>
      <p>Abra o app novamente assim que a internet voltar para continuar usando o painel operacional.</p>
      <button type="button" onclick="window.location.reload()">Tentar novamente</button>
    </main>
  </body>
</html>
